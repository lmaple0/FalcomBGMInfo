name: Build FalcomModernBGMInfo DLL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v1.1
      
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 'a42af01b72c28a8e1d7b48107b33e4f286a55ef6'
        
    - name: Install vcpkg dependencies (x86)
      run: |
        vcpkg install yaml-cpp:x86-windows-static minhook:x86-windows-static directx-headers:x86-windows-static directxtk:x86-windows-static
        
    - name: Configure CMake (x86)
      run: |
        cmake -B build -S src/FalcomModernBGMInfo -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" -A Win32
        
    - name: Build
      run: |
        cmake --build build --config Release
        
    - name: Display build output
      run: |
        dir build\Release\*.dll
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FalcomModernBGMInfo-x86-Release
        path: build/Release/FalcomModernBGMInfo.dll
        retention-days: 30
