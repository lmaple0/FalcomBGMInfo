name: Build FalcomModernBGMInfo DLL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      VCPKG_DEFAULT_TRIPLET: 'x86-windows-static'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v1.1
      
    - name: Setup vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git ${{ github.workspace }}/vcpkg
        ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.bat
        echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $env:GITHUB_ENV
        
    - name: Install vcpkg dependencies
      run: |
        ${{ github.workspace }}/vcpkg/vcpkg install yaml-cpp minhook directx-headers directxtk --triplet x86-windows-static
        
    - name: Configure CMake
      run: |
        cmake -B build -S src/FalcomModernBGMInfo `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -A Win32
        
    - name: Build
      run: |
        cmake --build build --config Release
        
    - name: Display build output
      run: |
        dir build\Release\*.dll
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FalcomModernBGMInfo-x86-Release
        path: build/Release/FalcomModernBGMInfo.dll
        retention-days: 30
