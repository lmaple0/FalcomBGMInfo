name: Build FalcomModernBGMInfo DLL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v1.1
      
    - name: Setup vcpkg
      shell: bash
      run: |
        VCPKG_ROOT="${GITHUB_WORKSPACE}/vcpkg"
        git clone https://github.com/microsoft/vcpkg.git "${VCPKG_ROOT}"
        "${VCPKG_ROOT}/bootstrap-vcpkg.bat"
        echo "VCPKG_ROOT=${VCPKG_ROOT}" >> $GITHUB_ENV
        
    - name: Install vcpkg dependencies
      shell: bash
      run: |
        "${VCPKG_ROOT}/vcpkg" install yaml-cpp minhook directx-headers directxtk --triplet x86-windows-static
        
    - name: Check installed packages
      shell: bash
      run: |
        ls -la "${VCPKG_ROOT}/installed/x86-windows-static/lib/" || echo "No lib dir"
        ls -la "${VCPKG_ROOT}/installed/x86-windows-static/share/" || echo "No share dir"
        
    - name: Configure CMake
      shell: bash
      run: |
        cmake -B build -S src/FalcomModernBGMInfo -A Win32 -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x86-windows-static -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
        
    - name: Build
      run: |
        cmake --build build --config Release
        
    - name: Display build output
      run: |
        dir build\Release\*.dll
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FalcomModernBGMInfo-x86-Release
        path: build/Release/FalcomModernBGMInfo.dll
        retention-days: 30
